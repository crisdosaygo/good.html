<div class="child-wrapper">
  <h3>Toggle Child (alive)</h3>
  <div class="child-actions">
    <button onclick=ChildAction>Child Action</button>
    <button onclick=AnotherAction>Another Action</button>
    <span class="click-count">Clicks: ${_self.childClicks || 0}</span>
  </div>
  <p class="child-status" id="child-alive">
    ✅ Child rendered. Handlers should work.
  </p>
</div>
